# 开发环境覆盖：暴露端口 + 本地构建 API
# 用法: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  zenstats:
    # 开发时从本地源码构建，覆盖预构建镜像
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

  zenstats_db:
    ports:
      - "5432:5432"

  zenstats_events_db:
    ports:
      - "8123:8123"
      - "9000:9000"
