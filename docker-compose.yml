# ZenStats Docker Compose 部署编排
# ===================================
# 使用方式:
#   1. cp .env.example .env && vi .env
#   2. docker compose up -d
#
# 本地构建覆盖:
#   将 zenstats 仓库 clone 到 ../zenstats，取消 zenstats 服务的 build 注释

services:
  # ---- 前端网关 (Caddy) ----
  frontend:
    image: ${IMAGE_FRONTEND:-ghcr.io/zenstats/zenstats-web:latest}
    # 本地构建（需将 zenstats-web 仓库 clone 到 ../zenstats-web）:
    # 使用方式: docker compose build --no-cache frontend && docker compose up -d
    # build:
    #   context: ../zenstats-web
    #   dockerfile: Dockerfile
    #   args:
    #     VITE_DATA_DOMAIN: ${ZENSTATS_DOMAIN:-localhost}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ZENSTATS_DOMAIN=${ZENSTATS_DOMAIN:-localhost}
    volumes:
      - caddy-data:/data
    depends_on:
      zenstats:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---- API 后端 ----
  zenstats:
    image: ${IMAGE_ZENSTATS:-ghcr.io/zenstats/zenstats:latest}
    # 本地构建（需将 zenstats 仓库 clone 到 ../zenstats）:
    # build:
    #   context: ../zenstats
    #   dockerfile: Dockerfile
    restart: always
    expose:
      - "8080"
    environment:
      - APP_ENV=prod
      - GIN_MODE=release
      - ZENSTATS_LOG_OUTPUT=stdout
      - ZENSTATS_DB_HOST=zenstats_db
      - ZENSTATS_DB_PORT=5432
      - ZENSTATS_DB_PASSWORD=${DB_PASSWORD:-postgres}
      - ZENSTATS_DB_USERNAME=postgres
      - ZENSTATS_DB_DATABASE=zenstats
      - ZENSTATS_CLICKHOUSE_ADDR=zenstats_events_db:9000
      - ZENSTATS_MAXMIND_LICENSE_KEY=${ZENSTATS_MAXMIND_LICENSE_KEY}
      - ZENSTATS_SECRET_KEY=${ZENSTATS_SECRET_KEY:-}
      - ZENSTATS_DOMAIN=${ZENSTATS_DOMAIN:-localhost}
    volumes:
      - zenstats-data:/app/data
    depends_on:
      zenstats_db:
        condition: service_healthy
      zenstats_events_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---- 数据库 ----
  zenstats_db:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql
    expose:
      - "5432"
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=zenstats
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  zenstats_events_db:
    image: clickhouse/clickhouse-server:25.11.5.8-alpine
    restart: unless-stopped
    volumes:
      - event-data:/var/lib/clickhouse
      - event-logs:/var/log/clickhouse-server
      - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
    expose:
      - "8123"
      - "9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
      - CLICKHOUSE_DB=zenstats_events_db
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db-data:
  event-data:
  event-logs:
  zenstats-data:
  caddy-data:
