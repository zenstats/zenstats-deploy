apiVersion: v1
kind: Secret
metadata:
  name: zenstats-secrets
  namespace: zenstats
  labels:
    app.kubernetes.io/part-of: zenstats
type: Opaque
stringData:
  # ===== 必填: 数据库密码 =====
  # 生成方式: openssl rand -base64 16
  DB_PASSWORD: "postgres"

  # ===== 必填: JWT 签名密钥 =====
  # 生成方式: openssl rand -base64 32
  ZENSTATS_SECRET_KEY: "change_me_to_a_random_secret"

  # ===== 可选: MaxMind GeoIP License Key =====
  # 免费注册: https://dev.maxmind.com/geoip/geolite2-free-geolocation-data
  # 留空将使用 Loyalsoldier/geoip 免费数据库作为降级方案
  ZENSTATS_MAXMIND_LICENSE_KEY: ""

  # ===== 可选: ClickHouse 认证 =====
  # ZENSTATS_CLICKHOUSE_USERNAME: "default"
  # ZENSTATS_CLICKHOUSE_PASSWORD: ""

  # ===== 可选: SMTP 邮件配置 =====
  # ZENSTATS_SMTP_HOST: ""
  # ZENSTATS_SMTP_PORT: "587"
  # ZENSTATS_SMTP_USERNAME: ""
  # ZENSTATS_SMTP_PASSWORD: ""
  # ZENSTATS_SMTP_FROM: ""
