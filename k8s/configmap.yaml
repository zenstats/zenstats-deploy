---
# ClickHouse 配置文件
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: zenstats
  labels:
    app.kubernetes.io/part-of: zenstats
data:
  ipv4-only.xml: |
    <clickhouse>
        <listen_host>0.0.0.0</listen_host>
    </clickhouse>

  logs.xml: |
    <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>

        <query_log replace="1">
            <database>system</database>
            <table>query_log</table>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
            <engine>
                ENGINE = MergeTree
                PARTITION BY event_date
                ORDER BY (event_time)
                TTL event_date + interval 30 day
                SETTINGS ttl_only_drop_parts=1
            </engine>
        </query_log>

        <!-- 禁用不必要的日志表以节省资源 -->
        <metric_log remove="remove" />
        <asynchronous_metric_log remove="remove" />
        <query_thread_log remove="remove" />
        <text_log remove="remove" />
        <trace_log remove="remove" />
        <session_log remove="remove" />
        <part_log remove="remove" />
    </clickhouse>

  low-resources.xml: |
    <!-- 低内存环境优化（< 16 GB RAM） -->
    <clickhouse>
        <mark_cache_size>524288000</mark_cache_size>

        <profile>
            <default>
                <max_threads>1</max_threads>
                <max_block_size>8192</max_block_size>
                <max_download_threads>1</max_download_threads>
                <input_format_parallel_parsing>0</input_format_parallel_parsing>
                <output_format_parallel_formatting>0</output_format_parallel_formatting>
            </default>
        </profile>
    </clickhouse>

---
# Caddy 配置（K8s 版本 — 仅 HTTP，TLS 由 Ingress 处理）
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-caddyfile
  namespace: zenstats
  labels:
    app.kubernetes.io/part-of: zenstats
data:
  Caddyfile: |
    {
        # K8s 部署：仅监听 HTTP，TLS 由 Ingress 控制器处理
        auto_https off
        servers {
            trusted_proxies static private_ranges
        }
    }

    :80 {
        root * /srv

        # Tracker JS - 允许跨域访问，用于三方网站引用
        @trackerJs path /js/*
        handle @trackerJs {
            @jsOptions method OPTIONS
            header @jsOptions Access-Control-Allow-Origin "*"
            header @jsOptions Access-Control-Allow-Methods "GET, OPTIONS"
            header @jsOptions Access-Control-Allow-Headers "*"
            header @jsOptions Access-Control-Allow-Private-Network "true"
            header @jsOptions Access-Control-Max-Age "86400"
            respond @jsOptions 204
            header {
                Access-Control-Allow-Origin "*"
                Access-Control-Allow-Methods "GET, OPTIONS"
                Cross-Origin-Resource-Policy "cross-origin"
            }
            file_server {
                root /srv
            }
        }

        # Tracker event ingestion - 允许三方网站跨域上报
        handle /api/event {
            @eventOptions method OPTIONS
            header @eventOptions Access-Control-Allow-Origin "*"
            header @eventOptions Access-Control-Allow-Methods "POST, OPTIONS"
            header @eventOptions Access-Control-Allow-Headers "Content-Type, X-Requested-With"
            header @eventOptions Access-Control-Allow-Private-Network "true"
            header @eventOptions Access-Control-Max-Age "86400"
            respond @eventOptions 204
            reverse_proxy zenstats-api:8080
        }

        # API 请求代理到后端
        handle /api/* {
            reverse_proxy zenstats-api:8080
        }

        # SPA 静态文件 + 路由回退
        handle {
            file_server {
                root /srv
                try_files {path} /index.html
            }
        }

        # 安全头
        header {
            X-Content-Type-Options "nosniff"
            X-Frame-Options "DENY"
            Referrer-Policy "strict-origin-when-cross-origin"
        }

        # 静态资源缓存
        @assets path /assets/*
        header @assets Cache-Control "public, max-age=31536000, immutable"

        # 请求日志
        log {
            output stdout
            format json
        }

        # 压缩
        encode gzip
    }

---
# 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: zenstats-config
  namespace: zenstats
  labels:
    app.kubernetes.io/part-of: zenstats
data:
  # 部署域名（必填 — 修改为你的实际域名）
  ZENSTATS_DOMAIN: "stats.example.com"
