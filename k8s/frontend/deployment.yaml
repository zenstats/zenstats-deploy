apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: zenstats
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: zenstats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: zenstats
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: caddy
          image: ghcr.io/zenstats/zenstats-web:latest
          imagePullPolicy: Always
          # 生产环境建议固定版本号:
          # image: ghcr.io/zenstats/zenstats-web:v1.0.0
          # imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            # Caddy 使用此变量覆盖默认 localhost 域名
            # 可选：K8s Ingress 已处理域名路由，通常不需要设置
            - name: ZENSTATS_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: zenstats-config
                  key: ZENSTATS_DOMAIN
                  optional: true
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]  # Caddy 绑定 80 端口需要
            readOnlyRootFilesystem: false  # Caddy 需要写入 /srv 临时文件
      volumes:
        - name: caddyfile
          configMap:
            name: frontend-caddyfile
