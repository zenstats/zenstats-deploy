apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenstats-api
  namespace: zenstats
  labels:
    app.kubernetes.io/name: zenstats-api
    app.kubernetes.io/part-of: zenstats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zenstats-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zenstats-api
        app.kubernetes.io/part-of: zenstats
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000  # 确保 PVC 卷权限与容器 runAsUser 一致
      # initContainers 等待依赖服务就绪
      initContainers:
        - name: wait-for-postgresql
          image: postgres:18-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h postgresql -U postgres -d zenstats; do
                echo "PostgreSQL not ready, retrying in 3s..."
                sleep 3
              done
              echo "PostgreSQL is ready."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenstats-secrets
                  key: DB_PASSWORD
        - name: wait-for-clickhouse
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for ClickHouse..."
              until wget -q -O - http://clickhouse:8123/ping 2>/dev/null; do
                echo "ClickHouse not ready, retrying in 3s..."
                sleep 3
              done
              echo "ClickHouse is ready."
      containers:
        - name: zenstats-api
          image: ghcr.io/zenstats/zenstats:latest
          imagePullPolicy: Always
          # 生产环境建议固定版本号:
          # image: ghcr.io/zenstats/zenstats:v1.0.0
          # imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # 应用模式
            - name: APP_ENV
              value: "prod"
            - name: GIN_MODE
              value: "release"
            - name: ZENSTATS_LOG_OUTPUT
              value: "stdout"
            # 数据库连接 — 固定值
            - name: ZENSTATS_DB_HOST
              value: "postgresql.zenstats.svc.cluster.local"
            - name: ZENSTATS_DB_PORT
              value: "5432"
            - name: ZENSTATS_DB_USERNAME
              value: "postgres"
            - name: ZENSTATS_DB_DATABASE
              value: "zenstats"
            # ClickHouse 连接
            - name: ZENSTATS_CLICKHOUSE_ADDR
              value: "clickhouse.zenstats.svc.cluster.local:9000"
            - name: ZENSTATS_CLICKHOUSE_USERNAME
              value: "zenstats"
            - name: ZENSTATS_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenstats-secrets
                  key: CLICKHOUSE_PASSWORD
                  optional: true
            # 域名
            - name: ZENSTATS_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: zenstats-config
                  key: ZENSTATS_DOMAIN
                  optional: true
            # 密钥 — 从 Secret 注入
            - name: ZENSTATS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenstats-secrets
                  key: DB_PASSWORD
            - name: ZENSTATS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zenstats-secrets
                  key: ZENSTATS_SECRET_KEY
            - name: ZENSTATS_MAXMIND_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: zenstats-secrets
                  key: ZENSTATS_MAXMIND_LICENSE_KEY
                  optional: true
            - name: ZENSTATS_GEOIP_MIRROR
              valueFrom:
                configMapKeyRef:
                  name: zenstats-config
                  key: ZENSTATS_GEOIP_MIRROR
                  optional: true
          volumeMounts:
            - name: app-data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false  # /app/data 需要写入 GeoIP 数据库
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: zenstats-app-data
