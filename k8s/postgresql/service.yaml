apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: zenstats
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: zenstats
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
