# 测试专用环境 — 独立端口，不占用开发环境
# 用法:
#   make test-up          # 启动 PG + ClickHouse 测试实例
#   go run main.go seed --test  # 生成确定性测试数据
#   go test ./internal/service/stats/... -run Integration -v -count=1
#   make test-down        # 清理

services:
  zenstats_test_db:
    image: postgres:16-alpine
    restart: "no"
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zenstats
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    tmpfs:
      - /var/lib/postgresql/data

  zenstats_test_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: "no"
    ports:
      - "8124:8123"
      - "9001:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
      - CLICKHOUSE_DB=zenstats_events_db
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    tmpfs:
      - /var/lib/clickhouse
      - /var/log/clickhouse-server
